name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (for example 0.1.1)
        required: true
        type: string
      skip_crates_publish:
        description: Skip cargo publish and only run tap/GitHub release steps
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify Release Inputs
    runs-on: ubuntu-latest
    environment: release
    env:
      REVIEWLOOP_GMAIL_CLIENT_ID: ${{ secrets.REVIEWLOOP_GMAIL_CLIENT_ID }}
      REVIEWLOOP_GMAIL_CLIENT_SECRET: ${{ secrets.REVIEWLOOP_GMAIL_CLIENT_SECRET }}
    outputs:
      crate_name: ${{ steps.meta.outputs.crate_name }}
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate tag and collect package metadata
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          crate_name=$(sed -nE 's/^name\s*=\s*"([^"]+)".*/\1/p' Cargo.toml | head -n1)
          version=$(sed -nE 's/^version\s*=\s*"([^"]+)".*/\1/p' Cargo.toml | head -n1)

          if [[ -z "$crate_name" || -z "$version" ]]; then
            echo "Failed to parse crate metadata from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "${INPUT_VERSION:-}" ]]; then
              echo "workflow_dispatch requires inputs.version" >&2
              exit 1
            fi
            if [[ "${INPUT_VERSION}" != "${version}" ]]; then
              echo "Manual release version ${INPUT_VERSION} does not match Cargo.toml version ${version}" >&2
              exit 1
            fi
            tag_name="v${version}"
          else
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$version" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
              exit 1
            fi
            tag_name="${GITHUB_REF_NAME}"
          fi

          echo "crate_name=$crate_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Release quality gates
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets --locked

  publish-crates-io:
    name: Publish To crates.io
    runs-on: ubuntu-latest
    needs: verify
    environment: release
    env:
      REVIEWLOOP_GMAIL_CLIENT_ID: ${{ secrets.REVIEWLOOP_GMAIL_CLIENT_ID }}
      REVIEWLOOP_GMAIL_CLIENT_SECRET: ${{ secrets.REVIEWLOOP_GMAIL_CLIENT_SECRET }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Publish crate (skip if version already exists)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATE_NAME: ${{ needs.verify.outputs.crate_name }}
          VERSION: ${{ needs.verify.outputs.version }}
          SKIP_CRATES_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_crates_publish && 'true' || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "Missing required secret: CARGO_REGISTRY_TOKEN" >&2
            exit 1
          fi

          if [[ "${SKIP_CRATES_PUBLISH}" == "true" ]]; then
            echo "Skipping cargo publish by manual request."
            exit 0
          fi

          if curl -fsSL \
            -A "reviewloop-release-workflow" \
            -H "Accept: application/json" \
            "https://crates.io/api/v1/crates/${CRATE_NAME}/${VERSION}" >/dev/null; then
            echo "${CRATE_NAME} ${VERSION} already published; skipping cargo publish."
            exit 0
          fi

          publish_log="$(mktemp)"
          set +e
          cargo publish --locked 2>&1 | tee "${publish_log}"
          status=${PIPESTATUS[0]}
          set -e

          if [[ ${status} -eq 0 ]]; then
            exit 0
          fi

          if grep -q "already exists on crates.io index" "${publish_log}"; then
            echo "${CRATE_NAME} ${VERSION} already published during this workflow run; continuing."
            exit 0
          fi

          exit "${status}"

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs:
      - verify
      - publish-crates-io
    environment: release
    permissions:
      contents: read

    steps:
      - name: Validate tap publishing configuration
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO != '' && vars.HOMEBREW_TAP_REPO || 'Acture/homebrew-ac' }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]]; then
            echo "Missing required secret: HOMEBREW_TAP_GITHUB_TOKEN" >&2
            exit 1
          fi

          echo "Using tap repository: ${HOMEBREW_TAP_REPO}"

      - name: Resolve crate download URL and checksum
        id: crate
        env:
          CRATE_NAME: ${{ needs.verify.outputs.crate_name }}
          VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          checksum=""
          for attempt in {1..20}; do
            response=$(curl -fsSL \
              -A "reviewloop-release-workflow" \
              -H "Accept: application/json" \
              "https://crates.io/api/v1/crates/${CRATE_NAME}/${VERSION}" || true)
            checksum=$(echo "$response" | jq -r '.version.checksum // empty')
            if [[ -n "$checksum" ]]; then
              break
            fi
            echo "Waiting for crates.io metadata propagation (${attempt}/20)..."
            sleep 15
          done

          if [[ -z "$checksum" ]]; then
            echo "Could not resolve checksum for ${CRATE_NAME} ${VERSION} from crates.io" >&2
            exit 1
          fi

          download_url="https://crates.io/api/v1/crates/${CRATE_NAME}/${VERSION}/download"

          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"
          echo "download_url=$download_url" >> "$GITHUB_OUTPUT"

      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO != '' && vars.HOMEBREW_TAP_REPO || 'Acture/homebrew-ac' }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula version, url and sha256
        env:
          CRATE_NAME: ${{ needs.verify.outputs.crate_name }}
          VERSION: ${{ needs.verify.outputs.version }}
          DOWNLOAD_URL: ${{ steps.crate.outputs.download_url }}
          CHECKSUM: ${{ steps.crate.outputs.checksum }}
          HOMEBREW_FORMULA_PATH: ${{ vars.HOMEBREW_FORMULA_PATH }}
        shell: bash
        run: |
          set -euo pipefail

          formula_rel_path="${HOMEBREW_FORMULA_PATH:-Formula/${CRATE_NAME}.rb}"
          formula_file="tap/${formula_rel_path}"
          formula_class=$(echo "${CRATE_NAME}" | awk -F '[-_]' '{for (i=1; i<=NF; i++) printf toupper(substr($i,1,1)) substr($i,2)}')
          description=$(sed -nE 's/^description\s*=\s*"([^"]+)".*/\1/p' Cargo.toml | head -n1)
          homepage=$(sed -nE 's/^homepage\s*=\s*"([^"]+)".*/\1/p' Cargo.toml | head -n1)
          license=$(sed -nE 's/^license\s*=\s*"([^"]+)".*/\1/p' Cargo.toml | head -n1)

          mkdir -p "$(dirname "$formula_file")"

          if [[ ! -f "$formula_file" ]]; then
            {
              printf 'class %s < Formula\n' "${formula_class}"
              printf '  desc "%s"\n' "${description}"
              printf '  homepage "%s"\n' "${homepage}"
              printf '  url "%s"\n' "${DOWNLOAD_URL}"
              printf '  sha256 "%s"\n' "${CHECKSUM}"
              printf '  license "%s"\n' "${license}"
              printf '  version "%s"\n' "${VERSION}"
              printf '\n'
              printf '  depends_on "rust" => :build\n'
              printf '\n'
              printf '  def install\n'
              printf '    system "cargo", "install", *std_cargo_args\n'
              printf '  end\n'
              printf '\n'
              printf '  test do\n'
              printf '    assert_match "%s", shell_output("#{bin}/%s --version")\n' "${VERSION}" "${CRATE_NAME}"
              printf '  end\n'
              printf 'end\n'
            } > "$formula_file"
          fi

          perl -0pi -e '
            s{^\s*url\s+"[^"]+"\s*$}{  url "'"$DOWNLOAD_URL"'"}m;
            s{^\s*sha256\s+"[^"]+"\s*$}{  sha256 "'"$CHECKSUM"'"}m;
            s{^\s*version\s+"[^"]+"\s*$}{  version "'"$VERSION"'"}m;
          ' "$formula_file"

          if ! grep -qE '^\s*version\s+"' "$formula_file"; then
            awk -v version="$VERSION" '
              BEGIN { inserted = 0 }
              {
                print $0
                if (!inserted && $0 ~ /^[[:space:]]*url[[:space:]]+"/) {
                  print "  version \"" version "\""
                  inserted = 1
                }
              }
            ' "$formula_file" > "${formula_file}.tmp"
            mv "${formula_file}.tmp" "$formula_file"
          fi

          grep -q "url \"${DOWNLOAD_URL}\"" "$formula_file"
          grep -q "sha256 \"${CHECKSUM}\"" "$formula_file"
          grep -q "version \"${VERSION}\"" "$formula_file"

      - name: Commit and push tap update
        env:
          CRATE_NAME: ${{ needs.verify.outputs.crate_name }}
          VERSION: ${{ needs.verify.outputs.version }}
          HOMEBREW_FORMULA_PATH: ${{ vars.HOMEBREW_FORMULA_PATH }}
        shell: bash
        run: |
          set -euo pipefail

          formula_rel_path="${HOMEBREW_FORMULA_PATH:-Formula/${CRATE_NAME}.rb}"

          cd tap
          if git diff --quiet -- "$formula_rel_path"; then
            echo "No formula changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$formula_rel_path"
          git commit -m "reviewloop ${VERSION}"

          default_branch=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')
          git push origin "HEAD:${default_branch}"

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify
      - publish-crates-io
      - update-homebrew-tap
    environment: release

    steps:
      - name: Publish GitHub release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag_name }}
          generate_release_notes: true
